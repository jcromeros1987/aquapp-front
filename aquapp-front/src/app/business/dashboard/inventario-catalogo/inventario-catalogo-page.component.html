<div class="page-card">
  <h1>Inventario (catálogo)</h1>
  <p class="subtitle">
    Tipos de activo o unidad que puedes contar por sucursal (<code>catalog_kind = INVENTARIO</code>). Ej.: motos,
    tanques, garrafones, equipos. Luego registra cantidades en <strong>Inventario</strong>.
  </p>

  <p class="alert alert-error" *ngIf="error">{{ error }}</p>
  <p class="alert alert-ok" *ngIf="okMsg">{{ okMsg }}</p>

  <div class="toolbar">
    <div class="field">
      <span class="field-label">Nuevo tipo</span>
      <input type="text" [(ngModel)]="newName" placeholder="Ej. Motocicleta de reparto" />
    </div>
    <button type="button" class="btn btn-primary" (click)="create()" [disabled]="saving">
      Crear
    </button>
  </div>

  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows">
          <td *ngIf="editing?.id !== r.id">{{ r.name }}</td>
          <td *ngIf="editing?.id === r.id">
            <input type="text" [(ngModel)]="editName" />
          </td>
          <td>
            <div class="actions" *ngIf="editing?.id !== r.id">
              <button type="button" class="btn btn-ghost" (click)="startEdit(r)">Editar</button>
              <button type="button" class="btn btn-danger" (click)="remove(r)">Eliminar</button>
            </div>
            <div class="actions" *ngIf="editing?.id === r.id">
              <button type="button" class="btn btn-primary" (click)="saveEdit()" [disabled]="saving">
                Guardar
              </button>
              <button type="button" class="btn btn-ghost" (click)="cancelEdit()">Cancelar</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
