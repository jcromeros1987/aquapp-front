<div class="page-card">
  <h1>Insumos</h1>
  <p class="subtitle">
    Rubros de materiales y operación en <code>cat_products</code> con
    <code>catalog_kind = INSUMOS</code> (distintos de nómina y de tipos para venta).
  </p>

  <p class="alert alert-error" *ngIf="error">{{ error }}</p>
  <p class="alert alert-ok" *ngIf="okMsg">{{ okMsg }}</p>

  <div class="toolbar">
    <button type="button" class="btn btn-primary" (click)="addModalOpen = true">Nuevo rubro</button>
  </div>

  <app-modal [(open)]="addModalOpen" title="Nuevo rubro de insumos" size="md">
    <div class="toolbar">
      <div class="field">
        <span class="field-label">Nombre</span>
        <input type="text" [(ngModel)]="newName" placeholder="Ej. Jabón para planta" />
      </div>
      <button type="button" class="btn btn-primary" (click)="create()" [disabled]="saving">Crear</button>
    </div>
  </app-modal>

  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows">
          <td *ngIf="editing?.id !== r.id">{{ r.name }}</td>
          <td *ngIf="editing?.id === r.id">
            <input type="text" [(ngModel)]="editName" />
          </td>
          <td>
            <div class="actions" *ngIf="editing?.id !== r.id">
              <button type="button" class="btn btn-ghost" (click)="startEdit(r)">Editar</button>
              <button type="button" class="btn btn-danger" (click)="remove(r)">Eliminar</button>
            </div>
            <div class="actions" *ngIf="editing?.id === r.id">
              <button type="button" class="btn btn-primary" (click)="saveEdit()" [disabled]="saving">
                Guardar
              </button>
              <button type="button" class="btn btn-ghost" (click)="cancelEdit()">Cancelar</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
