<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-labelledby="titulo-mapa">
  <title id="titulo-mapa">Esquema de zona Santa María Ixtiyucan  referencia para calibrar GPS</title>
  <defs>
    <linearGradient id="fondo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f5e9"/>
      <stop offset="1" stop-color="#fff8e1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#fondo)"/>
  <rect x="8" y="8" width="784" height="584" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="8 6" opacity="0.7"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#1b5e20" font-weight="600">
    Santa María Ixtiyucan  área de referencia (no es imagen de Google Maps)
  </text>
  <text x="400" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#546e7a">
    Bordes del cuadro = bounds en environment (N 19.1892, S 19.1813, O -97.826, E -97.804)
  </text>
  <!-- Vías esquemáticas -->
  <path d="M 120 120 L 680 480 M 680 140 L 120 500 M 400 40 L 400 560" stroke="#a5d6a7" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <path d="M 120 120 L 680 480 M 680 140 L 120 500" stroke="#81c784" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <text x="760" y="95" font-family="system-ui,sans-serif" font-size="14" fill="#37474f">N ‘</text>
  <!-- Punto A: centro vista -->
  <circle cx="122" cy="213" r="14" fill="#1565c0" stroke="#fff" stroke-width="3"/>
  <text x="122" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#0d47a1">A</text>
  <text x="138" y="228" font-family="system-ui,sans-serif" font-size="10" fill="#263238">Centro vista</text>
  <text x="138" y="242" font-family="system-ui,sans-serif" font-size="9" fill="#546e7a">19.186394, -97.822638</text>
  <!-- Punto B: lugar 75127 -->
  <circle cx="569" cy="346" r="14" fill="#6a1b9a" stroke="#fff" stroke-width="3"/>
  <text x="569" y="323" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4a148c">B</text>
  <text x="545" y="378" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#263238">Lugar 75127</text>
  <text x="545" y="392" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#546e7a">19.184646, -97.810350</text>
  <!-- Punto C: negocio -->
  <circle cx="673" cy="263" r="14" fill="#c62828" stroke="#fff" stroke-width="3"/>
  <text x="673" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#b71c1c">C</text>
  <text x="655" y="288" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#263238">Purísima Concepción</text>
  <text x="655" y="302" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#546e7a">19.185737, -97.807490</text>
  <text x="400" y="575" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#78909c">
    Sustituye este SVG por tu captura (PNG) si calzas exactamente estos bounds en environment.
  </text>
</svg>
